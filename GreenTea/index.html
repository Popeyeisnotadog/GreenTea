<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>六一儿童节快乐 - ENHYPEN</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            overflow-x: auto;
            font-family: 'Segoe UI', '华文行书', 'Microsoft YaHei', 'PingFang SC', '楷体', cursive, sans-serif;
            background: linear-gradient(145deg, #ffecd2 0%, #fcb69f 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: default;
            padding: 20px;
        }

        .bg-glow {
            position: fixed;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(255,215,150,0.4) 0%, rgba(255,165,80,0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: slowRotate 20s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes slowRotate {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            100% { transform: rotate(10deg) scale(1.2); opacity: 1; }
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(4px);
            padding: 2rem;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,200,0.4);
            animation: fadeIn 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 30px;
        }

        .festive-title {
            font-size: clamp(2.2rem, 12vw, 6rem);
            font-weight: 900;
            background: linear-gradient(135deg, #FFA500, #FF4500, #FFD700, #FF8C00);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shineMove 3s ease infinite, floatText 2.5s ease-in-out infinite;
            text-shadow: 0 0 15px rgba(255,100,0,0.5);
            letter-spacing: 0.08em;
            margin-bottom: 30px;
            white-space: nowrap;
        }

        @keyframes shineMove {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        @keyframes floatText {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.03); text-shadow: 0 0 30px rgb(255, 100, 0);}
            100% { transform: translateY(0px) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.88); }
            to { opacity: 1; transform: scale(1); }
        }

        .deco-emoji {
            font-size: 2rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            animation: bounceEmoji 2s infinite;
        }

        @keyframes bounceEmoji {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-8px); }
        }

        .characters-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin: 20px 0 40px;
        }

        .character {
            background: rgba(255, 255, 240, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 20px 25px 25px;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
            cursor: pointer;
            width: 240px;
        }

        .character:hover {
            transform: translateY(-5px);
            background: rgba(255, 250, 210, 0.8);
        }

        .character-img {
            width: 150px;
            height: auto;
            display: block;
            margin: 0 auto;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .jump-animation {
            animation: jump 0.3s ease-in-out 2;
        }

        @keyframes jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        .stretch-animation {
            animation: stretch 0.25s ease-in-out 2;
        }

        @keyframes stretch {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .speech-bubble {
            position: relative;
            background: white;
            border-radius: 20px;
            padding: 8px 15px;
            margin: 15px auto 0;
            width: fit-content;
            max-width: 180px;
            font-size: 14px;
            font-weight: 500;
            color: #5a3a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid #ffcd94;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 20px;
            border-width: 0 12px 12px 12px;
            border-style: solid;
            border-color: transparent transparent white transparent;
            filter: drop-shadow(0 1px 0 #ffcd94);
        }

        .toast-message {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8);
            color: gold;
            font-size: 2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            white-space: nowrap;
            z-index: 2000;
            animation: fadeOutUp 1s ease forwards;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        @keyframes fadeOutUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            70% { opacity: 0.9; transform: translate(-50%, -70%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.2); visibility: hidden; }
        }

        .music-player-area {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 18px 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        .music-player-area:hover {
            background: rgba(0, 0, 0, 0.75);
            transform: scale(1.02);
        }

        audio {
            height: 32px;
            width: 220px;
            border-radius: 30px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #ffefc0;
        }

        .music-label {
            color: #ffefb0;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            background: #ff8c2e70;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .footer-note {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(90, 40, 10, 0.7);
            background: rgba(255,245,210,0.7);
            backdrop-filter: blur(5px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 20px;
            border-radius: 100px;
            font-weight: 500;
            z-index: 15;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .music-player-area {
                top: 12px;
                right: 12px;
                padding: 5px 12px;
                gap: 6px;
            }
            audio {
                width: 150px;
            }
            .music-label {
                font-size: 10px;
                padding: 2px 8px;
            }
            .festive-title {
                white-space: normal;
                word-break: keep-all;
            }
            .character {
                width: 200px;
                padding: 15px;
            }
            .character-img {
                width: 120px;
            }
            .speech-bubble {
                font-size: 12px;
                padding: 5px 12px;
            }
            .toast-message {
                font-size: 1.2rem;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="main-content">
    <div class="festive-title">🍭 六一儿童节快乐 ✨</div>
    <div class="deco-emoji">
        🎈🎁🍬🎂🧸🍭🎉
    </div>
</div>

<!-- 位置互换：左侧猫猫，右侧边牧 -->
<div class="characters-wrapper">
    <!-- 左侧：猫猫 -->
    <div class="character" id="catCharacter">
        <img class="character-img" id="catImg" src="images/猫猫.png" alt="cat" style="cursor: pointer;">
        <div class="speech-bubble">呜呜呜🥺🥹😭</div>
    </div>
    <!-- 右侧：边牧 -->
    <div class="character" id="collieCharacter">
        <img class="character-img" id="collieImg" src="images/边牧.png" alt="collie" style="cursor: pointer;">
        <div class="speech-bubble">揍我？还有这种好事？</div>
    </div>
</div>

<div class="music-player-area">
    <span class="music-label">🎵 SHOUT OUT</span>
    <audio id="bgAudio" controls autoplay loop>
        <source src="music/ENHYPEN-SHOUT OUT.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
    </audio>
</div>

<div class="footer-note">✨ 愿你的每一次坠落都有人接住；希望你的理想主义可以被保护好。 ✨</div>

<script>
    function showMessage(text) {
        const existingToast = document.querySelector('.toast-message');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        document.body.appendChild(toast);
        setTimeout(() => {
            if(toast && toast.parentNode) toast.remove();
        }, 1000);
    }

    // 猫猫：舒展放大 + 茶味+1
    const catImg = document.getElementById('catImg');
    catImg.addEventListener('click', (e) => {
        e.stopPropagation();
        catImg.classList.remove('stretch-animation');
        void catImg.offsetWidth;
        catImg.classList.add('stretch-animation');
        showMessage('🍵 茶味+1 🍵');
        canvasConfetti({
            particleCount: 35,
            spread: 55,
            origin: { y: 0.5 },
            colors: ['#B0E57C', '#A8D5BA']
        });
        setTimeout(() => {
            catImg.classList.remove('stretch-animation');
        }, 500);
    });

    // 边牧：跳跃 + 功德+1
    const collieImg = document.getElementById('collieImg');
    collieImg.addEventListener('click', (e) => {
        e.stopPropagation();
        collieImg.classList.remove('jump-animation');
        void collieImg.offsetWidth;
        collieImg.classList.add('jump-animation');
        showMessage('✨ 功德+1 ✨');
        canvasConfetti({
            particleCount: 30,
            spread: 45,
            origin: { y: 0.6 },
            colors: ['#FFD700', '#FFA500']
        });
        setTimeout(() => {
            collieImg.classList.remove('jump-animation');
        }, 600);
    });

    // 音乐与礼花部分（保持不变）
    const audio = document.getElementById('bgAudio');
    let played = false;

    function attemptPlay() {
        if (!played) {
            audio.play().then(() => {
                console.log("音乐开始播放");
            }).catch((e) => {
                console.log("自动播放被阻止", e);
                const playerDiv = document.querySelector('.music-player-area');
                playerDiv.style.transform = 'scale(1.03)';
                setTimeout(() => { playerDiv.style.transform = ''; }, 300);
            });
            played = true;
        }
    }

    window.addEventListener('load', () => {
        setTimeout(attemptPlay, 500);
        launchBigCelebration();
        setTimeout(() => launchBigCelebration(), 600);
        setTimeout(() => launchBigCelebration(), 1500);
        setInterval(() => miniConfetti(), 2800);
    });
    
    document.body.addEventListener('click', () => { attemptPlay(); launchRandomFirework(); });
    document.body.addEventListener('touchstart', () => { attemptPlay(); launchRandomFirework(); });
    
    function launchBigCelebration() {
        canvasConfetti({
            particleCount: 220,
            spread: 120,
            origin: { y: 0.7 },
            startVelocity: 25,
            colors: ['#FFA500', '#FF4500', '#FFD700', '#FF8C00', '#FF6347', '#FF69B4', '#32CD32'],
            decay: 0.9,
            ticks: 200
        });
        canvasConfetti({
            particleCount: 150,
            angle: 60,
            spread: 70,
            origin: { x: 0.2, y: 0.8 },
            startVelocity: 20,
            colors: ['#FFD966', '#FF9933', '#FF4D4D']
        });
        canvasConfetti({
            particleCount: 150,
            angle: 120,
            spread: 70,
            origin: { x: 0.8, y: 0.8 },
            startVelocity: 20,
            colors: ['#FFD966', '#FF9933', '#FF4D4D']
        });
        canvasConfetti({
            particleCount: 100,
            spread: 180,
            origin: { y: 0.5 },
            startVelocity: 12,
            colors: ['#f5a623', '#f8e71c', '#ff6b6b', '#4a90e2', '#50e3c2']
        });
    }
    
    function launchRandomFirework() {
        const xPos = Math.random();
        const yPos = Math.random() * 0.6 + 0.2;
        canvasConfetti({
            particleCount: 80,
            spread: 80,
            origin: { x: xPos, y: yPos },
            startVelocity: 18,
            colors: ['#FFB347', '#FF7F50', '#FFDAB9', '#F4A460', '#FFC0CB'],
            decay: 0.9
        });
    }
    
    function miniConfetti() {
        canvasConfetti({
            particleCount: 35,
            spread: 55,
            origin: { y: 0.1 },
            startVelocity: 8,
            colors: ['#FFBF69', '#F9DC5C', '#FF9F1C', '#E71D36']
        });
    }
    
    setTimeout(() => {
        canvasConfetti({
            particleCount: 60,
            spread: 70,
            origin: { y: 0.2 },
            startVelocity: 10,
            colors: ['#FFA500', '#FFD966']
        });
    }, 200);
    
    audio.addEventListener('play', () => { launchRandomFirework(); });
    window.addEventListener('focus', () => {
        if (audio.paused && played) audio.play().catch(e=>console.log("恢复播放失败",e));
    });
</script>
</body>
</html>
